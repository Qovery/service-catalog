apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "scaleway-mysql"
  version: "1.2.1"
  description: "Scaleway Managed Database MySQL instance with configurable node type, storage, backups, and network ACL"
  icon: "app://qovery-console/mysql"
  serviceFamily: "mysql"
  categories:
    - "database"
    - "mysql"
    - "scaleway"

spec:
  engine:
    type: terraform
    provider: SCW
    terraform:
      version: "1.9.7"
      allowedValues: ["1.5.7", "1.9.7", "1.13.3"]
      overridable: true
    credentials:
      default: cluster
      allowedValues: ["cluster", "env"]
      overridable: true
    backend:
      default: qovery
      allowedValues: ["qovery", "user_provided"]
      overridable: true
    timeout: 3600
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "instance_name"
      type: "string"
      required: true
      description: "Instance name. Letters, digits, hyphens, underscores; must start with a letter or digit; max 100 chars."
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]{0,99}$"
      minLength: 1
      maxLength: 100
    - name: "db_name"
      type: "string"
      required: true
      description: "MySQL database name. Letters, digits, underscores only; must start with a letter; max 64 chars. Hyphens are not allowed."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,63}$"
      minLength: 1
      maxLength: 64
    - name: "db_username"
      type: "string"
      required: true
      description: "Database username. Letters, digits, underscores; must start with a letter; max 32 chars (MySQL limit)."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,31}$"
      minLength: 1
      maxLength: 32
    - name: "db_password"
      type: "string"
      required: true
      sensitive: true
      description: 'Database user password. 8–128 chars. Must not contain /, @, ", or spaces.'
      pattern: '^[^/@" ]+$'
      minLength: 8
      maxLength: 128
    - name: "engine_version"
      type: "string"
      required: false
      default: "MySQL-8"
      description: "MySQL engine version"
      allowedValues:
        - "MySQL-8"
    - name: "node_type"
      type: "string"
      required: false
      default: "DB-DEV-S"
      description: "Scaleway node type"
      allowedValues:
        - "DB-DEV-S"
        - "DB-DEV-M"
        - "DB-DEV-L"
        - "DB-GP-XS"
        - "DB-GP-S"
        - "DB-GP-M"
        - "DB-GP-L"
        - "DB-GP-XL"
    - name: "volume_type"
      type: "string"
      required: false
      default: "lssd"
      description: "Volume backend type (lssd = local SSD; sbs_5k/sbs_15k = block SSD at 5k/15k IOPS)"
      allowedValues:
        - "lssd"
        - "sbs_5k"
        - "sbs_15k"
    - name: "volume_size_gb"
      type: "number"
      required: false
      default: "5"
      description: "Volume size in GB (min 5, max 10000)"
      min: 5
      max: 10000
    - name: "is_ha_cluster"
      type: "bool"
      required: false
      default: "false"
      description: "Enable high availability cluster mode"
    - name: "activate_backups"
      type: "bool"
      required: false
      default: "true"
      description: "Enable automated backups"
    - name: "slow_query_log"
      type: "bool"
      required: false
      default: "true"
      description: "Enable MySQL slow query log via the instance settings"
    - name: "publicly_accessible"
      type: "bool"
      required: false
      default: "false"
      description: "Open the database to traffic from acl_allowed_cidr. When false, no ACL is created (instance unreachable from outside the Scaleway private network)."
    - name: "acl_allowed_cidr"
      type: "string"
      required: false
      default: "0.0.0.0/0"
      description: "Single CIDR allowed to reach the instance. Only used when publicly_accessible is true. Use the console for multi-CIDR allowlists."
      pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"

  outputs:
    - name: "endpoint_ip"
      description: "Database endpoint IP (Load Balancer)"
    - name: "endpoint_port"
      description: "Database endpoint port (Load Balancer)"
    - name: "db_name"
      description: "Database name"
    - name: "db_username"
      description: "Database username"
    - name: "db_password"
      description: "Database user password"
      sensitive: true
    - name: "instance_id"
      description: "Scaleway RDB instance ID"
    - name: "certificate"
      description: "TLS CA certificate served by the database (PEM). Use for verify-full SSL."
      sensitive: true
