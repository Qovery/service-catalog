apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "scaleway-object-storage"
  version: "1.1.3"
  description: "Scaleway Object Storage bucket"
  icon: "app://qovery-console/scaleway"
  serviceFamily: "object-storage"
  categories:
    - "storage"
    - "object-storage"

spec:
  engine:
    type: terraform
    provider: SCW
    terraform:
      version: "1.9.7"
      allowedValues: ["1.5.7", "1.9.7", "1.13.3"]
      overridable: true
    credentials:
      default: cluster
      allowedValues: ["cluster", "env"]
      overridable: true
    backend:
      default: qovery
      allowedValues: ["qovery", "user_provided"]
      overridable: true
    timeout: 1800
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "bucket_name"
      type: "string"
      required: true
      description: "Must be globally unique. Auto-lowercased. 3–63 chars; letters, digits, and hyphens only; must start and end with a letter or digit. Underscores are not allowed."
      pattern: "^[A-Za-z0-9][A-Za-z0-9-]{1,61}[A-Za-z0-9]$"
      minLength: 3
      maxLength: 63
    - name: "acl"
      type: "string"
      required: false
      default: "private"
      description: "Controls read and write access."
      allowedValues:
        - "private"
        - "public-read"
        - "public-read-write"
    - name: "versioning_enabled"
      type: "bool"
      required: false
      default: "false"
      description: "Enable object versioning"
    - name: "force_destroy"
      type: "bool"
      required: false
      default: "false"
      description: "Allow bucket deletion even if it contains objects"

  outputs:
    - name: "bucket_name"
      description: "Bucket name"
    - name: "bucket_endpoint"
      description: "Bucket endpoint URL"
