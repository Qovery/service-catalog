apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "scaleway-managed-postgresql"
  version: "1.3.1"
  description: "Scaleway Managed Database PostgreSQL instance with configurable node type, storage, backups, and network ACL"
  icon: "app://qovery-console/postgresql"
  serviceFamily: "postgres"
  categories:
    - "database"
    - "postgresql"
    - "scaleway"

spec:
  engine:
    type: terraform
    provider: SCW
    terraform:
      version: "1.9.7"
      # module uses cross-variable validation, which requires TF 1.9+.
      allowedValues: ["1.9.7", "1.13.3"]
      overridable: true
    credentials:
      default: cluster
      allowedValues: ["cluster", "env"]
      overridable: true
    backend:
      default: qovery
      allowedValues: ["qovery", "user_provided"]
      overridable: true
    timeout: 3600
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "instance_name"
      type: "string"
      required: true
      description: "Letters, digits, hyphens, underscores; must start with a letter or digit; max 100 chars."
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]{0,99}$"
      minLength: 1
      maxLength: 100
    - name: "db_name"
      type: "string"
      required: true
      description: "Letters, digits, underscores only; must start with a letter; max 63 chars. Hyphens are not allowed."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_username"
      type: "string"
      required: true
      description: "Letters, digits, underscores; must start with a letter; max 63 chars. Reserved names not allowed: rdb_admin, postgres, or any name starting with 'pg_'."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_password"
      type: "string"
      required: true
      sensitive: true
      description: '8–128 chars. Must not contain /, @, ", or spaces.'
      pattern: '^[^/@" ]+$'
      minLength: 8
      maxLength: 128
    - name: "engine_version"
      type: "string"
      required: false
      default: "PostgreSQL-16"
      allowedValues:
        - "PostgreSQL-16"
        - "PostgreSQL-15"
        - "PostgreSQL-14"
    - name: "node_type"
      type: "string"
      required: true
      default: "DB-DEV-S"
      allowedValues:
        - "DB-DEV-S"
        - "DB-DEV-M"
        - "DB-DEV-L"
        - "DB-GP-XS"
        - "DB-GP-S"
        - "DB-GP-M"
        - "DB-GP-L"
        - "DB-GP-XL"
    - name: "volume_type"
      type: "string"
      required: false
      default: "lssd"
      description: "lssd = local SSD; sbs_5k/sbs_15k = block SSD at 5k/15k IOPS"
      allowedValues:
        - "lssd"
        - "sbs_5k"
        - "sbs_15k"
    - name: "volume_size_gb"
      type: "number"
      required: true
      default: "5"
      description: "Volume size in GB (min 5, max 10000)"
      min: 5
      max: 10000
    - name: "is_ha_cluster"
      type: "bool"
      required: false
      default: "false"
      description: "Enable high availability cluster mode"
    - name: "activate_backups"
      type: "bool"
      required: false
      default: "true"
      description: "Enable automated backups"
    - name: "publicly_accessible"
      type: "bool"
      required: false
      default: "false"
      description: "Open the database to traffic from acl_allowed_cidr. When false, no ACL is created (instance unreachable from outside the Scaleway private network)."
    - name: "acl_allowed_cidr"
      type: "string"
      required: false
      default: "0.0.0.0/0"
      description: "Only used when publicly_accessible is true; must not be 0.0.0.0/0 when public. Use the console for multi-CIDR allowlists."
      pattern: "^((25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])\\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])/(3[0-2]|[12]?[0-9])$"

  outputs:
    - name: "endpoint_ip"
      description: "Database endpoint IP (Load Balancer)"
    - name: "endpoint_port"
      description: "Database endpoint port (Load Balancer)"
    - name: "db_name"
      description: "Database name"
    - name: "db_username"
      description: "Database username"
    - name: "db_password"
      description: "Database user password"
      sensitive: true
    - name: "instance_id"
      description: "Scaleway RDB instance ID"
    - name: "certificate"
      description: "TLS CA certificate served by the database (PEM). Use for verify-full SSL."
      sensitive: true
