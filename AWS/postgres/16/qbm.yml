apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "aws-rds-postgresql"
  version: "1.0.1"
  description: "AWS RDS PostgreSQL 16 instance with configurable size, storage, backups, maintenance, monitoring, and network"
  icon: "app://qovery-console/postgresql"
  serviceFamily: "postgres"
  categories:
    - "database"
    - "postgresql"
    - "rds"

spec:
  engine:
    type: terraform
    provider: AWS
    terraform:
      version: "1.9.7"
      # Pinned to 1.9+: catalog uses cross-variable validation (a variable's validation references another).
      allowedValues: ["1.9.7", "1.13.3"]
      overridable: true
    credentials:
      default: cluster
      allowedValues: ["cluster", "env"]
      overridable: true
    backend:
      default: qovery
      allowedValues: ["qovery", "user_provided"]
      overridable: true
    timeout: 3600
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "db_name"
      type: "string"
      required: true
      description: "PostgreSQL database name. Letters, digits, underscores only; must start with a letter; max 63 chars. Hyphens are not allowed."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_username"
      type: "string"
      required: true
      description: "Master username. Letters, digits, underscores; must start with a letter; max 63 chars. Reserved names not allowed: admin, rdsadmin, rdsrepladmin, rdstopmgr, or any name starting with 'pg_'."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_password"
      type: "string"
      required: true
      sensitive: true
      description: 'Master password. 8–128 chars. Must not contain /, @, ", or spaces.'
      pattern: '^[^/@" ]+$'
      minLength: 8
      maxLength: 128
    - name: "port"
      type: "number"
      required: false
      default: "5432"
      description: "Database port (RDS reserves ports below 1150)"
      min: 1150
      max: 65535
    - name: "instance_class"
      type: "string"
      required: false
      default: "db.t3.micro"
      description: "RDS instance class"
      allowedValues:
        - "db.t3.micro"
        - "db.t3.small"
        - "db.t3.medium"
        - "db.t3.large"
        - "db.m5.large"
        - "db.m5.xlarge"
        - "db.m5.2xlarge"
        - "db.m5.4xlarge"
        - "db.r5.large"
        - "db.r5.xlarge"
    - name: "allocated_storage"
      type: "number"
      required: false
      default: "20"
      description: "Allocated storage in GiB (min 20; max 65536 for gp3/io1/io2, but gp2 caps at 16384)"
      min: 20
      max: 65536
    - name: "storage_type"
      type: "string"
      required: false
      default: "gp3"
      description: "EBS storage type"
      allowedValues:
        - "gp2"
        - "gp3"
        - "io1"
        - "io2"
    - name: "storage_encrypted"
      type: "bool"
      required: false
      default: "true"
      description: "Encrypt storage at rest"
    - name: "disk_iops"
      type: "number"
      required: false
      default: "0"
      description: "Provisioned IOPS. Only meaningful with io1/io2 (always) or gp3 (≥400 GiB). 0 lets AWS choose the default."
      min: 0
      max: 256000
    - name: "multi_az"
      type: "bool"
      required: false
      default: "true"
      description: "Enable Multi-AZ deployment"
    - name: "publicly_accessible"
      type: "bool"
      required: false
      default: "false"
      description: "Expose the database to the public internet"
    - name: "db_subnet_group_name"
      type: "string"
      required: false
      default: ""
      description: "Optional DB subnet group. Empty = AWS default for the VPC."
    - name: "apply_changes_now"
      type: "bool"
      required: false
      default: "false"
      description: "Apply changes immediately instead of waiting for the next maintenance window"
    - name: "allow_major_version_upgrade"
      type: "bool"
      required: false
      default: "true"
      description: "Allow major engine version upgrades on apply"
    - name: "auto_minor_version_upgrade"
      type: "bool"
      required: false
      default: "true"
      description: "Automatically apply minor version upgrades during the maintenance window"
    - name: "preferred_maintenance_window"
      type: "string"
      required: false
      default: "Tue:02:00-Tue:04:00"
      description: "Maintenance window (UTC), format ddd:hh24:mi-ddd:hh24:mi"
    - name: "preferred_backup_window"
      type: "string"
      required: false
      default: "00:00-01:00"
      description: "Daily backup window (UTC), format hh24:mi-hh24:mi"
    - name: "backup_retention_period"
      type: "number"
      required: false
      default: "14"
      description: "Days to retain automated backups (0 disables)"
      min: 0
      max: 35
    - name: "skip_final_snapshot"
      type: "bool"
      required: false
      default: "true"
      description: "Skip the final snapshot on deletion"
    - name: "delete_automated_backups"
      type: "bool"
      required: false
      default: "true"
      description: "Delete automated backups when the instance is deleted"
    - name: "copy_tags_to_snapshot"
      type: "bool"
      required: false
      default: "true"
      description: "Propagate instance tags to snapshots"
    - name: "performance_insights_enabled"
      type: "bool"
      required: false
      default: "true"
      description: "Enable RDS Performance Insights"
    - name: "performance_insights_retention_period"
      type: "number"
      required: false
      default: "7"
      description: "Performance Insights retention in days. Only used when performance_insights_enabled is true. Valid: 7, 731, or a multiple of 31."
      allowedValues:
        - "7"
        - "31"
        - "62"
        - "93"
        - "124"
        - "155"
        - "186"
        - "217"
        - "248"
        - "279"
        - "310"
        - "341"
        - "372"
        - "403"
        - "434"
        - "465"
        - "496"
        - "527"
        - "558"
        - "589"
        - "620"
        - "651"
        - "682"
        - "713"
        - "731"
    - name: "ca_cert_identifier"
      type: "string"
      required: false
      default: "rds-ca-rsa2048-g1"
      description: "CA certificate identifier used by the DB instance"
    - name: "monitoring_interval"
      type: "number"
      required: false
      default: "0"
      description: "Enhanced monitoring interval in seconds (0 disables). Allowed values: 0, 1, 5, 10, 15, 30, 60."
      allowedValues:
        - "0"
        - "1"
        - "5"
        - "10"
        - "15"
        - "30"
        - "60"
    - name: "monitoring_role_arn"
      type: "string"
      required: false
      default: ""
      description: "IAM role ARN for enhanced monitoring. Required when monitoring_interval > 0."
    - name: "option_group_name"
      type: "string"
      required: false
      default: ""
      description: "Optional option group name. Empty = AWS default."
    - name: "deletion_protection"
      type: "bool"
      required: false
      default: "false"
      description: "Prevent the database from being deleted via TF or the API"
    - name: "iam_database_authentication_enabled"
      type: "bool"
      required: false
      default: "false"
      description: "Enable IAM database authentication"
    - name: "dedicated_log_volume"
      type: "bool"
      required: false
      default: "false"
      description: "Provision a dedicated EBS volume for database logs (RDS feature)"

  outputs:
    - name: "db_identifier"
      description: "RDS instance identifier (what AWS console shows as the instance name)"
    - name: "db_endpoint"
      description: "RDS instance endpoint (host:port)"
    - name: "db_address"
      description: "RDS instance hostname"
    - name: "db_port"
      description: "RDS instance port"
    - name: "db_name"
      description: "Database name"
    - name: "db_username"
      description: "Master username"
    - name: "db_password"
      description: "Master password"
      sensitive: true
    - name: "db_resource_id"
      description: "RDS internal resource ID (used in IAM DB auth ARNs)"
    - name: "db_arn"
      description: "RDS instance ARN"
    - name: "db_engine_version_actual"
      description: "Engine version actually running (may include the minor AWS chose)"
