apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "aws-s3"
  version: "1.1.2"
  description: "S3 bucket with encryption, versioning, and public-access blocking"
  icon: "app://qovery-console/s3"
  serviceFamily: "s3"
  categories:
    - "storage"
    - "s3"

spec:
  engine:
    type: terraform
    provider: AWS
    terraform:
      version: "1.9.7"
      allowedValues: ["1.5.7", "1.9.7", "1.13.3"]
      overridable: true
    credentials:
      default: cluster
      allowedValues: ["cluster", "env"]
      overridable: true
    backend:
      default: qovery
      allowedValues: ["qovery", "user_provided"]
      overridable: true
    timeout: 1800
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "bucket_name"
      type: "string"
      required: true
      description: "Globally unique bucket name. Auto-lowercased. 3–63 chars, letters/digits/hyphens only, must start and end with a letter or digit. Underscores are not allowed."
      pattern: "^[A-Za-z0-9][A-Za-z0-9-]{1,61}[A-Za-z0-9]$"
      minLength: 3
      maxLength: 63
    - name: "versioning"
      type: "bool"
      required: false
      default: "true"
      description: "Enable object versioning"
    - name: "encryption"
      type: "bool"
      required: false
      default: "true"
      description: "Enable server-side encryption (AES-256)"
    - name: "force_destroy"
      type: "bool"
      required: false
      default: "false"
      description: "Allow bucket deletion even if it contains objects"
    - name: "bucket_policy"
      type: "bool"
      required: false
      default: "true"
      description: "Attach the default bucket policy"

  outputs:
    - name: "bucket_arn"
      description: "Bucket ARN"
    - name: "bucket_name"
      description: "Bucket name"
    - name: "bucket_region"
      description: "Bucket region"
