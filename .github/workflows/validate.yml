name: Validate Blueprints

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-catalog-gen:
    name: Build catalog-gen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build catalog-gen from the PR's own source so schema and validator stay in lockstep.
      # The published GHCR image lags by one merge (publish-catalog-gen runs on main only),
      # so pulling :latest would validate the PR against a stale binary.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/catalog-gen

      - name: Build
        working-directory: tools/catalog-gen
        run: cargo build --release --locked

      - uses: actions/upload-artifact@v4
        with:
          name: catalog-gen
          path: tools/catalog-gen/target/release/catalog-gen
          retention-days: 1
          if-no-files-found: error

  validate-qbm:
    name: Validate QBM manifests
    runs-on: ubuntu-latest
    needs: [build-catalog-gen]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: catalog-gen
          path: bin

      - name: Validate QBM manifests and TF variable alignment
        run: |
          chmod +x bin/catalog-gen
          bin/catalog-gen validate --root .

  discover-terraform-blueprints:
    name: Discover changed Terraform blueprints
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: discover
        name: List changed Terraform blueprint paths
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          PATHS="[]"
          for main_tf in $(find . -mindepth 4 -maxdepth 4 -name 'main.tf' -type f \
            -not -path './tools/*' \
            -not -path './.github/*' \
            -not -path './.git/*'); do
            dir=$(dirname "$main_tf" | sed 's|^\./||')
            if echo "$CHANGED_FILES" | grep -q "^${dir}/"; then
              PATHS=$(echo "$PATHS" | jq -c --arg p "$dir" '. += [$p]')
            fi
          done
          echo "matrix=$PATHS" >> $GITHUB_OUTPUT

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: [discover-terraform-blueprints]
    if: ${{ needs.discover-terraform-blueprints.outputs.matrix != '[]' }}
    strategy:
      matrix:
        blueprint: ${{ fromJSON(needs.discover-terraform-blueprints.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init & validate
        working-directory: ${{ matrix.blueprint }}
        run: |
          terraform init -backend=false
          terraform validate

  check-commit-messages:
    name: Check PR title format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|patch|core)(\([^)]+\))?: .+'; then
            echo "ERROR: invalid PR title: \"$PR_TITLE\""
            echo "       expected: feat|fix|patch|core(subject): message"
            exit 1
          fi
          echo "PR title is valid."

  check-version-bump:
    name: Check version bump
    runs-on: ubuntu-latest
    needs: [build-catalog-gen]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: catalog-gen
          path: bin

      - name: Check blueprint version bumps
        run: |
          chmod +x bin/catalog-gen
          bin/catalog-gen check-version-bump --root . --base-ref origin/main

  auto-tag:
    name: Auto-tag changed blueprints
    runs-on: ubuntu-latest
    needs: [build-catalog-gen, validate-qbm, validate-terraform]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.build-catalog-gen.result == 'success' &&
      needs.validate-qbm.result == 'success' &&
      (needs.validate-terraform.result == 'success' || needs.validate-terraform.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: catalog-gen
          path: bin

      - name: Create tags and releases for new versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x bin/catalog-gen
          bin/catalog-gen auto-tag --root .

  check-catalog:
    name: Check catalog.json is up to date
    runs-on: ubuntu-latest
    needs: [build-catalog-gen]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: catalog-gen
          path: bin

      - name: Generate catalog.json into temp file
        run: |
          chmod +x bin/catalog-gen
          bin/catalog-gen generate --root . --output catalog.json.generated

      - name: Diff against committed catalog.json
        run: |
          jq 'del(.generatedAt)' catalog.json > catalog.json.norm
          jq 'del(.generatedAt)' catalog.json.generated > catalog.json.generated.norm
          if ! diff -u catalog.json.norm catalog.json.generated.norm; then
            echo ""
            echo "catalog.json is out of date. Run 'mise run generate-catalog' locally and commit the result."
            exit 1
          fi
          echo "catalog.json is up to date."
