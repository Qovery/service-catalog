name: Validate Blueprints

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-qbm:
    name: Validate QBM manifests
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate QBM manifests and TF variable alignment
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/catalog-gen:latest \
            validate --root /repo

  discover-terraform-blueprints:
    name: Discover changed Terraform blueprints
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: discover
        name: List changed Terraform blueprint paths
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          PATHS="[]"
          for main_tf in $(find . -mindepth 4 -maxdepth 4 -name 'main.tf' -type f \
            -not -path './tools/*' \
            -not -path './.github/*' \
            -not -path './.git/*'); do
            dir=$(dirname "$main_tf" | sed 's|^\./||')
            if echo "$CHANGED_FILES" | grep -q "^${dir}/"; then
              PATHS=$(echo "$PATHS" | jq -c --arg p "$dir" '. += [$p]')
            fi
          done
          echo "matrix=$PATHS" >> $GITHUB_OUTPUT

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: [discover-terraform-blueprints]
    if: ${{ needs.discover-terraform-blueprints.outputs.matrix != '[]' }}
    strategy:
      matrix:
        blueprint: ${{ fromJSON(needs.discover-terraform-blueprints.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init & validate
        working-directory: ${{ matrix.blueprint }}
        run: |
          terraform init -backend=false
          terraform validate

  check-version-bump:
    name: Check version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: pip install pyyaml

      - name: Check blueprint version bumps
        run: |
          # Get list of changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          # Find all blueprint directories that had file changes
          CHANGED_BLUEPRINTS=""
          for qbm in $(find . -mindepth 4 -maxdepth 4 -name 'qbm.yml' -type f \
            -not -path './tools/*' \
            -not -path './.github/*' \
            -not -path './stacks/*' \
            -not -path './.git/*'); do
            dir=$(dirname "$qbm" | sed 's|^\./||')

            # Check if any file in this blueprint directory changed
            if echo "$CHANGED_FILES" | grep -q "^${dir}/"; then
              CHANGED_BLUEPRINTS="$CHANGED_BLUEPRINTS $dir"
            fi
          done

          if [ -z "$CHANGED_BLUEPRINTS" ]; then
            echo "No blueprint directories changed."
            exit 0
          fi

          ERRORS=""
          for dir in $CHANGED_BLUEPRINTS; do
            echo "Checking $dir..."

            # Get the version from main branch
            OLD_VERSION=$(git show origin/main:${dir}/qbm.yml 2>/dev/null | python3 -c "
          import yaml, sys
          try:
              doc = yaml.safe_load(sys.stdin)
              print(doc.get('metadata', {}).get('version', ''))
          except:
              print('')
          " || echo "")

            # Get the version from PR branch
            NEW_VERSION=$(python3 -c "
          import yaml
          with open('${dir}/qbm.yml') as f:
              doc = yaml.safe_load(f)
          print(doc.get('metadata', {}).get('version', ''))
          ")

            if [ -z "$OLD_VERSION" ]; then
              echo "  New blueprint (no version on main). OK."
              continue
            fi

            if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
              ERRORS="$ERRORS\nERROR: $dir has file changes but metadata.version was not bumped (still $OLD_VERSION)"
            else
              echo "  Version bumped: $OLD_VERSION → $NEW_VERSION. OK."
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS"
            exit 1
          fi

  auto-tag:
    name: Auto-tag changed blueprints
    runs-on: ubuntu-latest
    needs: [validate-qbm, validate-terraform]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.validate-qbm.result == 'success' &&
      (needs.validate-terraform.result == 'success' || needs.validate-terraform.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: pip install pyyaml

      - name: Create tags for new versions
        run: |
          TAGS_CREATED=""

          for qbm in $(find . -mindepth 4 -maxdepth 4 -name 'qbm.yml' -type f \
            -not -path './tools/*' \
            -not -path './.github/*' \
            -not -path './stacks/*' \
            -not -path './.git/*'); do
            dir=$(dirname "$qbm" | sed 's|^\./||')

            # Read version from qbm.yml
            VERSION=$(python3 -c "
          import yaml
          with open('$qbm') as f:
              doc = yaml.safe_load(f)
          print(doc.get('metadata', {}).get('version', ''))
          ")

            if [ -z "$VERSION" ]; then
              echo "Warning: no version in $qbm, skipping"
              continue
            fi

            # Tag format: {provider}/{service}/{version}/{metadata.version}
            # dir is already {provider}/{service}/{version}
            TAG="${dir}/${VERSION}"

            # Check if tag already exists
            if git tag -l "$TAG" | grep -q "$TAG"; then
              echo "Tag $TAG already exists, skipping"
            else
              echo "Creating tag: $TAG"
              git tag "$TAG"
              TAGS_CREATED="$TAGS_CREATED $TAG"
            fi
          done

          if [ -n "$TAGS_CREATED" ]; then
            echo "Pushing tags:$TAGS_CREATED"
            git push origin --tags
          else
            echo "No new tags to create."
          fi

  check-catalog:
    name: Check catalog.json is up to date
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate catalog.json into temp file
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/catalog-gen:latest \
            generate --root /repo --output /repo/catalog.json.generated

      - name: Diff against committed catalog.json
        run: |
          jq 'del(.generatedAt)' catalog.json > catalog.json.norm
          jq 'del(.generatedAt)' catalog.json.generated > catalog.json.generated.norm
          if ! diff -u catalog.json.norm catalog.json.generated.norm; then
            echo ""
            echo "catalog.json is out of date. Run 'mise run generate-catalog' locally and commit the result."
            exit 1
          fi
          echo "catalog.json is up to date."
