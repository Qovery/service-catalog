apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "helm-rabbitmq"
  version: "1.0.3"
  description: "RabbitMQ message broker via Bitnami Helm chart"
  icon: "https://cdn.qovery.com/icons/rabbitmq.svg"
  serviceFamily: "rabbitmq"
  categories:
    - "messaging"
    - "rabbitmq"

spec:
  engine:
    type: helm
    chart:
      repository: "https://charts.bitnami.com/bitnami"
      name: "rabbitmq"
      version: "15.4.6"
    arguments: []
    allowClusterWideResources: false

  contextVariables:
    - name: "namespace"
      source: "cluster.namespace"

  variables:
    - name: "replica_count"
      type: "number"
      required: false
      default: "1"
      description: "Number of RabbitMQ replicas"
      min: 1
      max: 10
    - name: "username"
      type: "string"
      required: false
      default: "user"
      description: "RabbitMQ default username. Use letters, digits, hyphens, underscores, and dots only."
      pattern: "^[a-zA-Z0-9._-]+$"
      minLength: 1
      maxLength: 64
    - name: "password"
      type: "string"
      required: true
      sensitive: true
      description: "RabbitMQ authentication password (min 10 chars recommended)."
      minLength: 10
      maxLength: 128
    - name: "memory_limit"
      type: "string"
      required: false
      default: "256Mi"
      description: "Memory limit for RabbitMQ pods. Must be a valid Kubernetes quantity (e.g. 256Mi, 512Mi, 1Gi)."
      pattern: "^[0-9]+(Ei|Pi|Ti|Gi|Mi|Ki|E|P|T|G|M|K|m)?$"

  outputs:
    - name: "rabbitmq_host"
      description: "RabbitMQ service hostname"
      sensitive: false
    - name: "rabbitmq_port"
      description: "RabbitMQ AMQP port"
      sensitive: false
