apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "helm-redis"
  version: "1.0.2"
  description: "Redis cache via Bitnami Helm chart"
  icon: "https://cdn.qovery.com/icons/redis.svg"
  serviceFamily: "redis"
  categories:
    - "cache"
    - "redis"

spec:
  engine: helm

  chart:
    repository: "https://charts.bitnami.com/bitnami"
    name: "redis"
    version: "25.3.11"

  arguments: []
  allowClusterWideResources: false

  contextVariables:
    - name: "namespace"
      source: "cluster.namespace"

  variables:
    - name: "memory_limit"
      type: "string"
      required: false
      default: "256Mi"
      description: "Memory limit for Redis pods. Must be a valid Kubernetes quantity (e.g. 256Mi, 512Mi, 1Gi)."
    - name: "password"
      type: "string"
      required: true
      sensitive: true
      description: "Redis authentication password (min 10 chars recommended)."

  outputs:
    - name: "redis_host"
      description: "Redis service hostname"
      sensitive: false
    - name: "redis_port"
      description: "Redis service port"
      sensitive: false
