apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "scaleway-mysql"
  version: "1.0.3"
  description: "Scaleway Managed Database MySQL instance with configurable node type and storage"
  icon: "https://cdn.qovery.com/icons/mysql.svg"
  serviceFamily: "mysql"
  categories:
    - "database"
    - "mysql"
    - "scaleway"

spec:
  engine:
    type: terraform
    provider: SCW
    engineVersion: "1.9.7"
    credentials:
      default: cluster
    backend:
      default: qovery
      overridable: true
    timeout: 3600
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "instance_name"
      type: "string"
      required: true
      description: "Instance name. Letters, digits, hyphens, underscores; must start with a letter or digit; max 100 chars."
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]{0,99}$"
      minLength: 1
      maxLength: 100
    - name: "db_name"
      type: "string"
      required: true
      description: "MySQL database name. Letters, digits, underscores only; must start with a letter; max 64 chars. Hyphens are not allowed."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,63}$"
      minLength: 1
      maxLength: 64
    - name: "db_username"
      type: "string"
      required: true
      description: "Database username. Letters, digits, underscores; must start with a letter; max 32 chars (MySQL limit)."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,31}$"
      minLength: 1
      maxLength: 32
    - name: "db_password"
      type: "string"
      required: true
      sensitive: true
      description: 'Database user password. 8–128 chars. Must not contain /, @, ", or spaces.'
      pattern: '^[^/@" ]+$'
      minLength: 8
      maxLength: 128
    - name: "node_type"
      type: "string"
      required: false
      default: "DB-DEV-S"
      description: "Scaleway node type"
      allowedValues:
        - "DB-DEV-S"
        - "DB-DEV-M"
        - "DB-DEV-L"
        - "DB-GP-XS"
        - "DB-GP-S"
        - "DB-GP-M"
        - "DB-GP-L"
        - "DB-GP-XL"
    - name: "volume_size_gb"
      type: "number"
      required: false
      default: "5"
      description: "Volume size in GB (min 5, max 10000)"
      min: 5
      max: 10000
    - name: "is_ha_cluster"
      type: "bool"
      required: false
      default: "false"
      description: "Enable high availability cluster mode"

  outputs:
    - name: "endpoint_ip"
      description: "Database endpoint IP"
    - name: "endpoint_port"
      description: "Database endpoint port"
    - name: "db_name"
      description: "Database name"
