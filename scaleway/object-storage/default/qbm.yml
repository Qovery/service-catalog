apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "scaleway-object-storage"
  version: "1.0.3"
  description: "Scaleway Object Storage bucket"
  icon: "https://cdn.qovery.com/icons/object-storage.svg"
  serviceFamily: "object-storage"
  categories:
    - "storage"
    - "object-storage"

spec:
  engine:
    type: terraform
    provider: SCW
    engineVersion: "1.9.7"
    credentials:
      default: cluster
    backend:
      default: qovery
      overridable: true
    timeout: 1800
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "bucket_name"
      type: "string"
      required: true
      description: "Globally unique bucket name. Auto-lowercased. 3–63 chars, letters/digits/hyphens only, must start and end with a letter or digit. Underscores are not allowed."
      pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
      minLength: 3
      maxLength: 63
    - name: "acl"
      type: "string"
      required: false
      default: "private"
      description: "Bucket ACL"
      allowedValues:
        - "private"
        - "public-read"
        - "public-read-write"
    - name: "versioning_enabled"
      type: "bool"
      required: false
      default: "false"
      description: "Enable object versioning"
    - name: "force_destroy"
      type: "bool"
      required: false
      default: "false"
      description: "Allow bucket deletion even if it contains objects"

  outputs:
    - name: "bucket_name"
      description: "Bucket name"
    - name: "bucket_endpoint"
      description: "Bucket endpoint URL"
