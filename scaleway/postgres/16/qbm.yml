apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "scaleway-managed-postgresql"
  version: "1.0.4"
  description: "Scaleway Managed Database PostgreSQL instance with configurable node type and storage"
  icon: "app://qovery-console/postgresql"
  serviceFamily: "postgres"
  categories:
    - "database"
    - "postgresql"
    - "scaleway"

spec:
  engine:
    type: terraform
    provider: SCW
    engineVersion: "1.9.7"
    credentials:
      default: cluster
    backend:
      default: qovery
      overridable: true
    timeout: 3600
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "instance_name"
      type: "string"
      required: true
      description: "Instance name. Letters, digits, hyphens, underscores; must start with a letter or digit; max 100 chars."
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]{0,99}$"
      minLength: 1
      maxLength: 100
    - name: "db_name"
      type: "string"
      required: true
      description: "PostgreSQL database name. Letters, digits, underscores only; must start with a letter; max 63 chars. Hyphens are not allowed."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_username"
      type: "string"
      required: true
      description: "Database username. Letters, digits, underscores; must start with a letter; max 63 chars."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_password"
      type: "string"
      required: true
      sensitive: true
      description: 'Database user password. 8–128 chars. Must not contain /, @, ", or spaces.'
      pattern: '^[^/@" ]+$'
      minLength: 8
      maxLength: 128
    - name: "node_type"
      type: "string"
      required: false
      default: "DB-DEV-S"
      description: "Scaleway node type"
      allowedValues:
        - "DB-DEV-S"
        - "DB-DEV-M"
        - "DB-DEV-L"
        - "DB-GP-XS"
        - "DB-GP-S"
        - "DB-GP-M"
        - "DB-GP-L"
        - "DB-GP-XL"
    - name: "volume_size_gb"
      type: "number"
      required: false
      default: "5"
      description: "Volume size in GB (min 5, max 10000)"
      min: 5
      max: 10000
    - name: "engine_version"
      type: "string"
      required: false
      default: "PostgreSQL-16"
      description: "PostgreSQL engine version"
      allowedValues:
        - "PostgreSQL-16"
        - "PostgreSQL-15"
        - "PostgreSQL-14"
    - name: "is_ha_cluster"
      type: "bool"
      required: false
      default: "false"
      description: "Enable high availability cluster mode"

  outputs:
    - name: "endpoint_ip"
      description: "Database endpoint IP"
    - name: "endpoint_port"
      description: "Database endpoint port"
    - name: "db_name"
      description: "Database name"
