replicaCount: {{ replica_count }}

authentication:
  user:
    value: "{{ username }}"
  password:
    value: "{{ password }}"
  # Reuse the sensitive password as the inter-node Erlang cookie — stable across pods, no hardcoded secret
  erlangCookie:
    value: "{{ password }}"

resources:
  requests:
    cpu: "250m"
    memory: "{{ memory_limit }}"
  limits:
    memory: "{{ memory_limit }}"

# Cluster the replicas via k8s peer discovery (StatefulSet + headless service); harmless at replica_count 1
k8sPeerDiscoveryPlugin:
  enabled: true
