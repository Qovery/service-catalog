apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "helm-rabbitmq"
  version: "2.0.0"
  description: "RabbitMQ message broker via the community groundhog2k Helm chart (official docker.io/rabbitmq image)"
  icon: "app://qovery-console/rabbitmq"
  serviceFamily: "rabbitmq"
  categories:
    - "messaging"
    - "rabbitmq"

spec:
  engine:
    type: helm
    chart:
      repository: "https://groundhog2k.github.io/helm-charts/"
      name: "rabbitmq"
      version: "2.3.5"
    arguments: []
    allowClusterWideResources: false

  variables:
    - name: "replica_count"
      type: "number"
      required: false
      default: "1"
      description: "Number of RabbitMQ replicas"
      min: 1
      max: 10
    - name: "username"
      type: "string"
      required: false
      default: "user"
      description: "RabbitMQ default username. Use letters, digits, hyphens, underscores, and dots only."
      pattern: "^[a-zA-Z0-9._-]+$"
      minLength: 1
      maxLength: 64
    - name: "password"
      type: "string"
      required: true
      sensitive: true
      description: "RabbitMQ authentication password (min 10 chars recommended)."
      minLength: 10
      maxLength: 128
    - name: "memory_limit"
      type: "string"
      required: false
      default: "512Mi"
      description: "Memory limit for RabbitMQ pods. Must be a valid Kubernetes quantity (e.g. 512Mi, 1Gi)."
      pattern: "^[0-9]+(Ei|Pi|Ti|Gi|Mi|Ki|E|P|T|G|M|K|m)?$"

  outputs:
    - name: "rabbitmq_host"
      description: "RabbitMQ service hostname"
      sensitive: false
    - name: "rabbitmq_port"
      description: "RabbitMQ AMQP port"
      sensitive: false
