apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "helm-redis"
  version: "1.1.0"
  description: "Redis cache via Bitnami Helm chart"
  icon: "app://qovery-console/redis"
  serviceFamily: "redis"
  categories:
    - "cache"
    - "redis"

spec:
  engine:
    type: helm
    chart:
      repository: "https://charts.bitnami.com/bitnami"
      name: "redis"
      version: "25.3.11"
    arguments: []
    allowClusterWideResources: false

  variables:
    - name: "memory_limit"
      type: "string"
      required: false
      default: "256Mi"
      description: "Memory limit for Redis pods. Must be a valid Kubernetes quantity (e.g. 256Mi, 512Mi, 1Gi)."
      pattern: "^[0-9]+(Ei|Pi|Ti|Gi|Mi|Ki|E|P|T|G|M|K|m)?$"
    - name: "password"
      type: "string"
      required: true
      sensitive: true
      description: "Redis authentication password (min 10 chars recommended)."
      minLength: 10
      maxLength: 128

  outputs:
    - name: "redis_host"
      description: "Redis service hostname"
      sensitive: false
    - name: "redis_port"
      description: "Redis service port"
      sensitive: false
