apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "helm-redis"
  version: "1.0.1"
  description: "Redis cache via the community groundhog2k Helm chart (official docker.io/redis image)"
  icon: "app://qovery-console/redis"
  serviceFamily: "redis"
  categories:
    - "cache"
    - "redis"

spec:
  engine:
    type: helm
    chart:
      repository: "https://groundhog2k.github.io/helm-charts/"
      name: "redis"
      version: "2.4.1"
    arguments: []
    allowClusterWideResources: false

  variables:
    - name: "memory_limit"
      type: "string"
      required: false
      default: "512Mi"
      description: "Must be a valid Kubernetes quantity (e.g. 512Mi, 1Gi)."
      pattern: "^[0-9]+(Ei|Pi|Ti|Gi|Mi|Ki|E|P|T|G|M|K|m)?$"
    - name: "password"
      type: "string"
      required: true
      sensitive: true
      description: "Min 10 chars recommended."
      minLength: 10
      maxLength: 128

  outputs:
    - name: "redis_host"
      description: "Redis service hostname"
      sensitive: false
    - name: "redis_port"
      description: "Redis service port"
      sensitive: false
