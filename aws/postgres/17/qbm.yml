apiVersion: "qovery.com/v1"
kind: ServiceBlueprint

metadata:
  name: "aws-rds-postgresql"
  version: "1.0.4"
  description: "AWS RDS PostgreSQL 17 instance with configurable size and storage"
  icon: "app://qovery-console/postgresql"
  serviceFamily: "postgres"
  categories:
    - "database"
    - "postgresql"
    - "rds"

spec:
  engine:
    type: terraform
    provider: AWS
    engineVersion: "1.9.7"
    credentials:
      default: cluster
    backend:
      default: qovery
      overridable: true
    timeout: 3600
    resources:
      cpu: "500m"
      ram: "512Mi"

  contextVariables:
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_cluster_name"
      source: "cluster.name"

  variables:
    - name: "db_name"
      type: "string"
      required: true
      description: "PostgreSQL database name. Letters, digits, underscores only; must start with a letter; max 63 chars. Hyphens are not allowed."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_username"
      type: "string"
      required: true
      description: "Master username. Letters, digits, underscores; must start with a letter; max 63 chars."
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"
      minLength: 1
      maxLength: 63
    - name: "db_password"
      type: "string"
      required: true
      sensitive: true
      description: 'Master password. 8–128 chars. Must not contain /, @, ", or spaces.'
      pattern: '^[^/@" ]+$'
      minLength: 8
      maxLength: 128
    - name: "instance_class"
      type: "string"
      required: false
      default: "db.t3.micro"
      description: "RDS instance class"
      allowedValues:
        - "db.t3.micro"
        - "db.t3.small"
        - "db.t3.medium"
        - "db.t3.large"
        - "db.m5.large"
        - "db.m5.xlarge"
        - "db.m5.2xlarge"
        - "db.m5.4xlarge"
        - "db.r5.large"
        - "db.r5.xlarge"
    - name: "allocated_storage"
      type: "number"
      required: false
      default: "20"
      description: "Allocated storage in GiB (min 20, max 65536 for gp3)"
      min: 20
      max: 65536
    - name: "multi_az"
      type: "bool"
      required: false
      default: "false"
      description: "Enable Multi-AZ deployment"

  outputs:
    - name: "db_endpoint"
      description: "RDS instance endpoint (host:port)"
    - name: "db_address"
      description: "RDS instance hostname"
    - name: "db_port"
      description: "RDS instance port"
    - name: "db_name"
      description: "Database name"
